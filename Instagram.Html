<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Profile Clone</title>

    <style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#fafafa;
}

.container{
    width:900px;
    margin:40px auto;
}

.profile{
    display:flex;
    align-items:center;
    margin-bottom:40px;
}

.profile-image img{
    width:150px;
    height:150px;
    border-radius:50%;
    border:3px solid #d3d3d3;
    object-fit:cover;
}

.profile-info{
    margin-left:80px;
}

.username h2{
    font-size:32px;
    margin-bottom:20px;
}

.stats{
    display:flex;
    gap:35px;
    margin-bottom:20px;
}

.stats p{
    font-size:18px;
}

.bio h3{
    margin-bottom:8px;
}

.bio p{
    font-size:17px;
}


.buttons{
    margin-top:20px;
}

button{
    width:180px;
    padding:10px;
    border:none;
    background:#efefef;
    border-radius:8px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    margin-right:10px;
}

button:hover{
    background:#dcdcdc;
}

.menu{
    display:flex;
    justify-content:center;
    gap:120px;
    border-top:1px solid lightgray;
    padding-top:18px;
    margin-bottom:25px;
    font-weight:bold;
}

.posts{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:5px;
}

.posts img{
    width:100%;
    height:300px;
    object-fit:cover;
}

</style>
</head>
<body>

<div class="container">

    <div class="profile">

        <div class="profile-image">
            <img src="Dp.jpeg" alt="Profile Picture">
        </div>

        <div class="profile-info">

            <div class="username">
                <h2>prajwal_kafle17</h2>
            </div>

            <div class="stats">
                <p><b>2</b> Posts</p>
                <p><b>107</b> Followers</p>
                <p><b>111</b> Following</p>
            </div>

            <div class="bio">
                <h3>Prajwal Kafle</h3>
                <p>What?</p>
            </div>

            <div class="buttons">
                <button>Edit Profile</button>
                <button>View Archive</button>
            </div>

        </div>

    </div>

    <div class="menu">

        <div>Posts</div>
        <div>Saved</div>
        <div>Tagged</div>

    </div>

    <div class="posts">

        <img src="First profile.jpeg" alt="Post 1">

        <img src="second profile.jpeg" alt="Post 2">

    </div>

</div>

</body>
</html>
